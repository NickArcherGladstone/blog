<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search — The Daily Brief</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="/" class="site-brand">
          <span class="site-name">The Daily Brief</span>
          <span class="site-byline">by Nicholas Archer</span>
        </a>
        <nav class="site-nav">
          <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/politics.html">Politics</a></li>
            <li><a href="/markets.html">Markets</a></li>
            <li><a href="/news.html">News</a></li>
            <li><a href="/sports.html">Sports</a></li>
            <li><a href="/food.html">Food</a></li>
            <li><a href="/podcast.html">Podcast</a></li>
            <li><a href="/about.html">About</a></li>
          </ul>
          <a href="/search.html" class="search-toggle active" aria-label="Search">
            <svg viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </a>
        </nav>
      </div>
    </header>

    <main class="container--narrow">
      <section class="category-header">
        <h1 class="category-title">Search</h1>
      </section>

      <form id="search-form" class="search-form" action="/search.html" method="get">
        <div class="search-input-wrap">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="search-input" name="q" placeholder="Search articles..." autocomplete="off" autofocus />
        </div>
      </form>

      <hr class="section-divider" />

      <section id="search-results" class="recent-posts"></section>

      <p id="search-empty" class="search-empty" hidden>No results found.</p>
      <p id="search-prompt" class="search-empty">Type a query to search all articles.</p>

      <span class="end-mark">\</span>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p>&copy; 2026 Nicholas Archer. All rights reserved.</p>
        <nav class="footer-nav">
          <a href="/about.html">About</a>
          <a href="/rss.xml">RSS</a>
        </nav>
      </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/search.js"></script>
  </body>
</html>
